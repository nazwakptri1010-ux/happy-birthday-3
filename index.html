<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>awaa</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
  </head>

  <body
    style="
      background-image: url(https://i.pinimg.com/736x/99/b2/4d/99b24d48ac1c4ff32bb0dd4b1b71613e.jpg);
      background-size: cover;
      background-position: center;
    "
    class="flex justify-center h-screen items-center"
  >

    <!-- AUDIO -->
    <audio id="musik" loop>
      <source src="bandaneira.mp3" type="audio/mpeg">
    </audio>

    <!-- KARTU -->
    <div
      class="bg-white border px-10 py-8 border-4 border-blue-300 shadow-lg shadow-blue-300 rounded-xl text-center animate__animated animate__backInDown m-8 w-80"
      id="kartu"
    >
      <h1
        class="text-4xl text-blue-500 font-bold animate__animated animate__pulse animate__infinite"
      >
        haii
      </h1>

      <button
        class="p-2 bg-blue-500 text-white rounded mt-5 hover:bg-blue-500 transition ease-in w-full animate__animated animate__delay-1s animate__tada"
        onclick="mulaiMusic(); ubahKartu()"
      >
        KLIK
      </button>
    </div>
    

    <script>
      let kartu = document.getElementById("kartu");

      // PLAY MUSIC
      function mulaiMusic() {
        document.getElementById("musik").play();
      }

      // SLIDE 1
      function ubahKartu() {
        kartu.innerHTML = `
        
          <h1 class="font-semibold animate__animated animate__zoomIn">
          selamat ulang tahun pahrii, doa terbaik buat kamu

          makasi yaa uda hadir di kehidupan aku, makasi juga uda selalu ngertiin aku.
          dan makasi uda sabar dan tetap bertahan sejauh ini..

          kalo selama ini aku masi banyak kurang dalam ngertiin kamu, aku minta maaf yaa.

          semoga kamu selalu bahagia, sehat, dan semua yang kamu inginkan bisa tercapai, Aamiin.

          semoga di umur kamu yang sekarang, kamu dapet banyak hal baik dan semua urusan kamu di permudah🤍          <button
            class="p-2 bg-blue-500 text-white rounded mt-5 w-full"
            onclick="slideDua()"
          >
            NEXT
          </button>
        `;
      }

      // SLIDE 2
      function slideDua() {
        kartu.innerHTML = `
          <img 
            src="pahri.jpeg"
            class="w-40 h-30 object-cover rounded-xl mx-auto animate__animated animate__fadeIn"
          >
          <h1 class="font-semibold animate__animated animate__fadeIn">
          <3
          <button
            class="p-2 bg-blue-500 text-white rounded mt-5 w-full"
            onclick="slideTiga()"
          >
            NEXT
          </button>
        `;
      }

      // SLIDE 3
      function slideTiga() {
        kartu.innerHTML = `
          <img 
            src="kis.gif"
            class="w-40 h-40 object-cover rounded-xl mx-auto animate__animated animate__fadeIn"
          >

          <h2 class="font-semibold mt-4 animate__animated animate__fadeIn">
             <3
          </h2>

          <button
            class="p-2 bg-blue-500 text-white rounded mt-5 w-full"
            onclick="slideEmpat()"
          >
            NEXT
          </button>
        `;
      }

      // SLIDE 4
      function slideEmpat() {
        kartu.innerHTML = `
          <img 
            src="pahri2.jpeg"
            class="w-60 mx-auto rounded-xl animate__animated animate__zoomIn"
          >

          <h1 class="font-semibold mt-4 animate__animated animate__fadeIn">
            hidup lebih lama lagi ya? sekali lagi happy birthday <3

          <button
            class="p-2 bg-blue-500 text-white rounded mt-5 w-full"
            onclick="location.reload()"
          >
            SELESAI
          </button>
        `;
      }
    </script>

  </body>
</html>
